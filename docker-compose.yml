      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bd_sucursales_bibliotech?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
