  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      SERVER_PORT: 62000
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:56231/eureka/
    ports:
      - "${API_GATEWAY_PORT:-0}:62000"
    depends_on:
      - eureka-service
      - config-server
      - autor-service
      - cliente-service
      - empleado-service
      - libros-service
      - multa-service
      - prestamos-service
      - reserva-service
      - sucursal-service

volumes:
  bibliotech-mysql-data:
