spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: clientes-service
              uri: lb://CLIENTES-SERVICE
              predicates:
                - Path=/api/v1/clientes/**
            - id: libros-service
              uri: lb://LIBROS-SERVICE
              predicates:
                - Path=/api/v1/libros/**
            - id: prestamos-service
              uri: lb://PRESTAMOS-SERVICE
              predicates:
                - Path=/api/v1/prestamos/**
            - id: multas-service
              uri: lb://MULTAS-SERVICE
              predicates:
                - Path=/api/v1/multas/**
            - id: autor-service
              uri: lb://AUTOR-SERVICE
              predicates:
                - Path=/api/v1/autores/**
            - id: sucursal-service
              uri: lb://SUCURSAL-SERVICE
              predicates:
                - Path=/api/v1/sucursales/**
            - id: empleado-service
              uri: lb://EMPLEADO-SERVICE
              predicates:
                - Path=/api/v1/empleados/**
            - id: reserva-service
              uri: lb://RESERVA-SERVICE
              predicates:
                - Path=/api/v1/reservas/**

            # Swagger centralizado por API Gateway.
            # Se enruta por Eureka para soportar microservicios con server.port=0.
            - id: autor-service-docs
              uri: lb://AUTOR-SERVICE
              predicates:
                - Path=/autor-service/v3/api-docs
              filters:
                - RewritePath=/autor-service/v3/api-docs,/v3/api-docs
            - id: sucursal-service-docs
              uri: lb://SUCURSAL-SERVICE
              predicates:
                - Path=/sucursal-service/v3/api-docs
              filters:
                - RewritePath=/sucursal-service/v3/api-docs,/v3/api-docs
            - id: clientes-service-docs
              uri: lb://CLIENTES-SERVICE
              predicates:
                - Path=/clientes-service/v3/api-docs
              filters:
                - RewritePath=/clientes-service/v3/api-docs,/v3/api-docs
            - id: libros-service-docs
              uri: lb://LIBROS-SERVICE
              predicates:
                - Path=/libros-service/v3/api-docs
              filters:
                - RewritePath=/libros-service/v3/api-docs,/v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Autor Service
        url: /autor-service/v3/api-docs
      - name: Sucursal Service
        url: /sucursal-service/v3/api-docs
      - name: Cliente Service
        url: /clientes-service/v3/api-docs
      - name: Libros Service
        url: /libros-service/v3/api-docs

server:
  port: ${SERVER_PORT:62000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:56231/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
